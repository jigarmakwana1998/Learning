rules:
  - id: agents-must-not-import-database-drivers
    message: Agent modules must use the MCP/write-guard boundary; direct database-driver imports are forbidden.
    severity: ERROR
    languages: [python]
    paths:
      include: [/backend/app/agents/**]
    patterns:
      - pattern-either:
          - pattern: import sqlalchemy
          - pattern: import asyncpg
          - pattern: import psycopg
          - pattern: from sqlalchemy import $X
          - pattern: from asyncpg import $X
          - pattern: from psycopg import $X
  - id: no-interpolated-sql-or-cypher
    message: Do not interpolate strings into SQL or Cypher. Use parameterized queries through the data boundary.
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: $DB.execute(f"...")
          - pattern: $DB.execute("..." + $X + "...")
