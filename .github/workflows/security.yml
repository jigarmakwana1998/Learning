name: Security

on:
  pull_request:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-and-dependencies:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.12" }
      - name: SAST and project boundary rules
        run: |
          # Semgrep 1.136 imports pkg_resources, removed from setuptools 81+.
          python -m pip install "setuptools<81" "semgrep==1.136.0" "bandit==1.8.3" "pip-audit==2.9.0"
          semgrep scan --config p/python --config .semgrep/agent-boundaries.yml --error
          bandit --recursive backend/app --severity-level medium --confidence-level medium
          pip-audit --requirement backend/requirements.txt
      - name: Gitleaks current revision
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      - name: TruffleHog full history nightly / PR range otherwise
        run: |
          python -m pip install "trufflehog==2.2.1"
          trufflehog filesystem --directory . --json --fail || exit 1
  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Enforce a digest-pinned non-root Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint:v2.12.0 < backend/Dockerfile
          grep -Eq '^FROM .+@sha256:[a-f0-9]{64}$' backend/Dockerfile
      - name: Build and scan image for high and critical CVEs
        run: |
          docker build --file backend/Dockerfile --tag learning-coach:security .
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.58.2 image --severity HIGH,CRITICAL learning-coach:security
