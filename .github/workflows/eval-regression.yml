name: Eval regression

on:
  pull_request:
    paths: ["backend/app/agents/**", "backend/evaluations/**", "backend/app/harness/**"]
  schedule:
    - cron: "41 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  golden-baseline:
    continue-on-error: true
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.12" }
      - run: python -m pip install -r requirements.txt
      - name: Verify deterministic golden baseline
        run: |
          test -f evaluations/golden-baseline.json
          python scripts/check_eval_regression.py --baseline evaluations/golden-baseline.json --fixtures evaluations/fixtures.json
