name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-24.04
    env:
      ADMIN_PASSWORD: AdminPass123!
      SUPABASE_URL: ""
      SUPABASE_PUBLISHABLE_KEY: ""
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade uv
      - run: uv venv && uv pip install -r requirements.txt ruff ty pytest-xdist pytest-testmon pytest-cov
      # Existing style debt is addressed separately; enforce correctness and
      # security-oriented lint rules for new CI failures in the meantime.
      - run: uv run ruff check . --ignore E501,E701,E702,B008,I001,UP017
      # The SQLite-backed tests share one database file; running them in
      # parallel races application startup and table creation.
      - run: uv run pytest --testmon -q --benchmark-disable --cov=app --cov-report=xml:coverage.xml
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with: { name: backend-coverage, path: backend/coverage.xml, if-no-files-found: warn }
  mobile:
    name: Mobile type check
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: mobile }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: "22", cache: npm, cache-dependency-path: mobile/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
