name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend lint, type, and tests
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade uv
      - run: uv venv && uv pip install -r requirements.txt ruff ty pytest-xdist pytest-testmon pytest-cov
      - run: uv run ruff format --check . && uv run ruff check .
      - run: uv run ty check app
      - run: uv run pytest -n auto --testmon -q --benchmark-disable --cov=app --cov-report=xml:coverage.xml
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with: { name: backend-coverage, path: backend/coverage.xml, if-no-files-found: warn }
  mobile:
    name: Mobile type check
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: mobile }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1e60f620b9541d6395b1830b7e9171f894905bd3 # v4.0.3
        with: { node-version: "22", cache: npm, cache-dependency-path: mobile/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
