name: Migration check

on:
  pull_request:
    paths: ["backend/alembic/**", "backend/app/models/**"]

permissions:
  contents: read

jobs:
  upgrade-and-downgrade:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: learning_coach, POSTGRES_USER: learning_coach, POSTGRES_PASSWORD: learning_coach }
        options: >-
          --health-cmd "pg_isready -U learning_coach -d learning_coach" --health-interval 5s --health-timeout 5s --health-retries 10
        ports: ["5432:5432"]
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.12" }
      - run: python -m pip install -r requirements.txt
      - env:
          DATABASE_URL: postgresql+asyncpg://learning_coach:learning_coach@127.0.0.1:${{ job.services.postgres.ports[5432] }}/learning_coach
        run: alembic upgrade head && alembic downgrade base && alembic upgrade head
