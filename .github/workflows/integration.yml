name: Integration

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

jobs:
  integration:
    if: github.event_name == 'push' || github.event.label.name == 'integration'
    runs-on: ubuntu-24.04
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.12" }
      - run: python -m pip install -r requirements.txt testcontainers pytest-xdist
      - name: Run adapter contracts, golden path, and write-guard tests
        run: |
          if rg -q '@pytest.mark.integration' tests; then
            pytest -m integration -n auto -q
          else
            echo 'No integration tests are marked yet; workflow is ready for the testcontainers suite.'
          fi
