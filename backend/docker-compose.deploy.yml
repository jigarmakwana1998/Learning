services:
  api:
    image: ${IMAGE:?Set IMAGE to an immutable image digest}
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
